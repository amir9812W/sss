<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        p{
            margin: 0px;
            font-family: arial;
        }
        .profile{
            display: inline-block;
            width: 200px;
            box-shadow: 2.5px 2.5px 10px rgba(0,0,0,0.2);
            align-items: center;
        }
        .oor{
            width: 200px;
            
        }
        .aki1{
            width: 100%;
        }
        .friends{
            display: block;
            width: 200px;
            margin-top:10px;
            margin-left:10px;

        }
        .aki{
            width: 40px;
            border-radius: 20px;
            vertical-align: top;
        }
        .text{
            width: 140px;
            vertical-align: top;
            margin-top: 10px;
            margin-left: 4px;
            font-size: 16px;
            font-weight: 400;
            color: rgb(111, 106, 106);
            font-family: 'roboto';
        }
        .text1{
            display: inline-block;
        }
        .part2{
            display:block;
            margin-top: 10px;
        }
        .button{
            display: block;
            margin-top: 10px;
            margin-left: 10px;
            margin-bottom: 10px;
        }
        .button1{
            color: white;
            background-color: rgb(38, 136, 247);
            border:none;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 12px;
            padding-right: 12px;
            border-radius: 4px;
            font-weight: 400;
            font-family: 'roboto';
        }
        .button1:active{
            cursor: pointer;
        }
        .user{
            font-family: arial;
            font-weight: 700;
            margin-left: 10px;
        }
        .class{
            display: inline-block;
            text-align: center;
        }
        
        
    </style>
</head>
<body>
  <div class="center">
    <div class="profile">
        <div class="oor">
            <img src="images/aki.jpg" alt="aki" class="aki1">
        </div>
        <div class="part2">
            <p class="user">Oliver</p>
            <div class="friends">
                <img src="images/aki.jpg" alt="whom" class="aki">
                <div class="text1">
                    <p class="text">2 mutual friends</p>
                </div>
            </div>
            <div class="button">
                <button class="button1">
                    Add a Friend
                </button>
            </div>
        </div>
    </div>
  </div>
</body>
</html>
